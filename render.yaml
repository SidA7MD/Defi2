databases:
  - name: ihsan-db
    plan: free
    databaseName: ihsan_db
    user: ihsan

services:
  - type: web
    name: ihsan-platform
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install && npx prisma generate
    startCommand: cd backend && npx prisma migrate deploy && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: ihsan-db
          property: connectionString
